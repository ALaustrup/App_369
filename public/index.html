<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRA MATRIX | Awaken Your Spark</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { color: #0ff; font-size: 3rem; }
        .btn { border: 2px solid #0f0; color: #0f0; padding: 15px 30px; text-decoration: none; font-size: 1.5rem; margin-top: 20px; transition: 0.3s; cursor: pointer; }
        .btn:hover { background: #0f0; color: #000; }
        #msg { margin-top: 15px; color: #fff; }
    </style>
</head>
<body>
    <h1>ASTRA MATRIX</h1>
    <p>The construct is fabricated. The Demiurge is watching.</p>
    <button id="downloadBtn" class="btn" onclick="downloadGame()">DOWNLOAD ASTRA MATRIX</button>
    <p id="msg"></p>

    <script>
        function downloadGame() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/android/i.test(userAgent)) {
                window.location.href = "/download/astra-matrix-latest.apk";
            } else {
                document.getElementById('msg').innerText = "Please open this page on your Android device to download the game.";
            }
        }
    </script>
</body>
</html>
